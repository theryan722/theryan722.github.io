<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Project Links</title>
	<style>
		:root {
			--bg: #f7f7f5;
			--card: #ffffff;
			--text: #202124;
			--muted: #5f6368;
			--border: #e5e7eb;
			--accent: #0f766e;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: linear-gradient(180deg, #fcfcfb 0%, var(--bg) 100%);
			color: var(--text);
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1.5rem;
		}

		main {
			width: min(640px, 100%);
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 1.5rem;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
		}

		h1 {
			margin: 0 0 0.5rem;
			font-size: 1.7rem;
		}

		p {
			margin: 0 0 1.2rem;
			color: var(--muted);
		}

		ul {
			list-style: none;
			padding: 0;
			margin: 0;
			display: grid;
			gap: 0.55rem;
		}

		a {
			display: block;
			padding: 0.65rem 0.8rem;
			border: 1px solid var(--border);
			border-radius: 10px;
			text-decoration: none;
			color: var(--text);
			transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.1s ease;
		}

		a:hover,
		a:focus-visible {
			border-color: var(--accent);
			background-color: #eef9f7;
			outline: none;
		}

		a:active {
			transform: translateY(1px);
		}
	</style>
</head>
<body>
	<main>
		<h1>My Projects</h1>
		<p>Quick links to my apps and experiments on this site. Note that these are mainly for my use and may not be fully polished or documented.</p>
		<ul>
			<li><a href="../">Home</a></li>
			<li><a href="../ingestion/">Ingestion</a></li>
			<li><a href="../japanesereview/">Japanese Review</a></li>
			<li><a href="../lock/">Lock</a></li>
			<li><a href="../mingmong/">Ming Mong</a></li>
			<li><a href="../notelisten/">Note Listen</a></li>
			<li><a href="../profiles/">Profiles</a></li>
			<li><a href="../scales/">Scales</a></li>
			<li><a href="../sightreading/">Sight Reading</a></li>
			<li><a href="../wordle/">Wordle</a></li>
			<li><a href="../kaomoji/">Kaomoji</a></li>
		</ul>
	</main>
</body>
</html>
