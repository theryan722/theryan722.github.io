<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Kaomoji Picker</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f4f6fb;
			--card: #ffffff;
			--text: #1f2a44;
			--muted: #5a6b8a;
			--accent: #2b7fff;
			--border: #dbe4f1;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 55%);
			color: var(--text);
		}

		.page {
			max-width: 860px;
			margin: 0 auto;
			padding: 2rem 1rem 3rem;
		}

		h1 {
			margin: 0 0 1rem;
			font-size: clamp(1.5rem, 2.5vw, 2rem);
		}

		.search {
			width: 100%;
			border: 1px solid var(--border);
			border-radius: 0.75rem;
			padding: 0.8rem 0.95rem;
			font-size: 1rem;
			outline: none;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
			background: #fff;
		}

		.search:focus {
			border-color: var(--accent);
			box-shadow: 0 0 0 3px rgba(43, 127, 255, 0.2);
		}

		.hint {
			margin: 0.5rem 0 1.2rem;
			color: var(--muted);
			font-size: 0.95rem;
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
			gap: 0.75rem;
		}

		.item {
			border: 1px solid var(--border);
			border-radius: 0.8rem;
			background: var(--card);
			padding: 0.85rem 0.8rem;
			text-align: center;
			cursor: pointer;
			transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
			user-select: none;
		}

		.item:hover {
			transform: translateY(-1px);
			border-color: #b5c7ea;
			box-shadow: 0 8px 18px rgba(36, 71, 133, 0.1);
		}

		.item:active {
			transform: translateY(0);
		}

		.kaomoji {
			font-size: 1.4rem;
			line-height: 1.2;
			margin: 0;
			min-height: 2rem;
		}

		.tags {
			margin: 0.35rem 0 0;
			font-size: 0.85rem;
			color: var(--muted);
		}

		.empty {
			border: 1px dashed var(--border);
			border-radius: 0.8rem;
			padding: 1rem;
			color: var(--muted);
			text-align: center;
			background: #fff;
		}

		.toast {
			position: fixed;
			left: 50%;
			bottom: 1rem;
			transform: translateX(-50%);
			background: #1f2a44;
			color: #fff;
			border-radius: 999px;
			padding: 0.45rem 0.75rem;
			font-size: 0.85rem;
			opacity: 0;
			pointer-events: none;
			transition: opacity 0.2s ease;
		}

		.toast.show {
			opacity: 1;
		}
	</style>
</head>
<body>
	<main class="page">
		<h1>Kaomoji</h1>
		<input id="search" class="search" type="search" placeholder="Search tags (example: happy, love)" />
		<p class="hint">Click any emoji to copy it to your clipboard.</p>
		<section id="results" class="grid" aria-live="polite"></section>
	</main>

	<div id="toast" class="toast" role="status" aria-live="polite"></div>

	<script src="app.js"></script>
</body>
</html>
