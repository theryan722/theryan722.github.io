<html>

<head>
    <title>Sight Reading</title>
    <script src="http://unpkg.com/tone"></script>
    <script src="https://unpkg.com/vexflow@1.2.93/releases/vexflow-min.js"></script>
    <script src="./app.js"></script>
    <style>
        #staff {
            margin-left: auto;
            margin-right: auto;
        }

        #note-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            font-family: Arial, sans-serif;
            font-weight: bold;
            text-align: center;
            color: #222;
        }

        .color-red {
            color: red;
        }

        .color-green {
            color: green;
        }

        #chart img{
            max-width: 250px;
            max-height: 250px;
        }
    </style>
</head>

<body>
    <h1>Sight Reading</h1>
    <div id="staff"></div>
    <div id="button-row" style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
        <button id="next-button">Next Note</button>
        <button id="answer-button">Display Answer</button>
        <button id="chart-button">Toggle Chart</button>
    </div>
    <div id="chart"></div>
    <div id="note-label"></div>
</body>

</html>
